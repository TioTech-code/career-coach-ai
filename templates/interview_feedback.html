<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Feedback | AI Career Coach</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <i class="fa-solid fa-briefcase"></i>
        AI Career Coach
    </div>

    <div class="nav-links">
        <a href="/dashboard">Dashboard</a>
        <a href="/interview">New Interview</a>
        <a href="/logout">Log Out</a>
    </div>
</nav>

<section class="form-section">
    <span class="badge">Interview Feedback</span>

    <h1>Your answer review</h1>

    <div class="feedback-box">
        {{ feedback | safe }}
    </div>

    <a href="/interview">
        <button>Practise Another Question →</button>
    </a>
</section>

</body>
</html>
