<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AI Career Coach</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<section class="auth-section">
    <div class="auth-card">

        <h1>Create Your Account</h1>

        {% if error %}
            <div class="form-error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">

            <label for="name">Name</label>
            <input
                id="name"
                type="text"
                name="name"
                autocomplete="name"
                required
            >

            <label for="email">Email</label>
            <input
                id="email"
                type="email"
                name="email"
                autocomplete="email"
                required
            >

            <label for="password">Password</label>
            <input
                id="password"
                type="password"
                name="password"
                minlength="8"
                autocomplete="new-password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p class="auth-link">
            Already have an account?
            <a href="/login">Log in</a>
        </p>

    </div>
</section>

</body>
</html>
